{% extends "base.html" %}

{% block title %}
Add Course - LearnbyTech
{% endblock %}

{% block content %}
<div class="container">
    <div class="course-form-page">
        <div class="course-form-left">
            <h1>Create Course</h1>
            <p>Add a new course</p>
            <img src="{{ url_for('static', filename='images/login-illustration.png.png') }}" alt="Create course">
        </div>

        <div class="course-form-right">
            <form method="post" action="{{ url_for('course_create') }}" class="course-form">
                {% if error %}
                <p style="color: #c00; margin: 0 0 16px 0; font-size: 0.9rem;">{{ error }}</p>
                {% endif %}

                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" value="{{ title or '' }}" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4" required>{{ description or '' }}</textarea>
                </div>

                <div class="form-group">
                    <label for="teacher_id">Teacher</label>
                    <select id="teacher_id" name="teacher_id" required>
                        {% for teacher in teachers %}
                        <option value="{{ teacher.id }}" {% if teacher_id and teacher_id|string == teacher.id|string %}selected{% endif %}>{{ teacher.username }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn-course-create">Create Course</button>

                <p class="course-form-links">
                    <a href="{{ url_for('courses_list') }}">Back to Courses</a>
                    <a href="{{ url_for('courses_list') }}">Cancel</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
